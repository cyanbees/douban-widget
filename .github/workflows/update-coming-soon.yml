name: 更新豆瓣即将上映
on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      - name: 抓取即将上映并匹配 TMDB
        run: node data/build.js --coming-soon
        env:
          TMDB_API_KEY: 8ffd70fb12c003093664f4aeb7b9fc5c
      - name: 提交更新
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/coming_soon.json
          git diff --staged --quiet || git commit -m "自动更新即将上映 $(date -u +%Y-%m-%d)"
          git push
