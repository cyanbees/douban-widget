name: 更新 FANZA 月度榜单
on:
  schedule:
    - cron: '0 0 1 * *'   # 每月1号运行
  workflow_dispatch:        # 也可手动触发

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: 安装依赖
        run: |
          npm init -y
          npm install playwright libsodium-wrappers

      - name: 安装 Playwright 浏览器 + 系统依赖
        run: |
          npx playwright install --with-deps chromium

      - name: 爬取 FANZA 月度榜单
        run: node scripts/fanza-monthly.js
        env:
          JAVDB_USER: ${{ secrets.JAVDB_USER }}
          JAVDB_PASS: ${{ secrets.JAVDB_PASS }}

      - name: 提交更新
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/fanza-monthly.json
          git diff --staged --quiet || git commit -m "自动更新 FANZA 月度榜单 $(date -u +%Y-%m-%d)"
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}
          git push
